<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Professional media production services including video, audio, and multimedia solutions.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="author" content="Phetso Donald">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Media Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>Media Production</h1>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">☰</label>

        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="media.html">Media</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>   
        </nav>
    </header>

    <main>

        <section class="video-showcase-section">
            <h2>Video Showcase</h2>
            <div class="video-container">
                <video width="640" height="340" controls>
                    <source src="./media/videos/first-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <video width="640" height="340" controls>
                    <source src="./media/videos/second-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>

        <section class="audio-section">
            <h2>Audio Sample</h2>
            <p>Listen to our audio production quality.</p>

            <audio controls>
                <source src="./media/audios/alec_koff-blues-ballad-487408.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section class="location-section">
            <h2>Location</h2>
            <p>Visit our studio at 123 Media Street</p>
            <div class="map-container">
                <iframe 
                src="https://www.google.com/maps?q=pretoria&output=embed"
                width="600" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
                </iframe>
            </div>
        </section>

        
        <section class="testimonial-section">
            <h2>Client Testimonials</h2>

            <div class="testimonials">
                <figure>
                    <img src="images/client1.jpg" alt="">
                    <figcaption>Amazing service!</figcaption>
                </figure>

                <figure>
                    <img src="images/client2.jpg" alt="">
                    <figcaption>Very professional</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>Email: contact@mediaproduction.com</p>
    </footer>

</body>
</html>
